name: Deploy to Google Cloud Run

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: terabox-bot
          source: .
          region: us-central1
          env_vars: |
            MODE=webhook
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            TERABOX_COOKIE=${{ secrets.TERABOX_COOKIE }}

      - name: Set webhook URL
        run: |
          SERVICE_URL=$(gcloud run services describe terabox-bot --region us-central1 --format 'value(status.url)')
          gcloud run services update terabox-bot \
            --region us-central1 \
            --update-env-vars "WEBHOOK_URL=${SERVICE_URL}"
